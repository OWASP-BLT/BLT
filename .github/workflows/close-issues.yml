name: Auto-Close New Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  close-new-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Close the issue with a message
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue.number;
            const repo = context.repo.repo;
            const owner = context.repo.owner;
            const author = context.payload.issue.user.login;

            // Check if the issue author is a bot
            const authorType = context.payload.issue.user.type;
            const knownBots = [
              'copilot', 'copilot-swe-agent',
              'sentry-autofix', 'sentry-io',
              'coderabbitai',
              'dependabot', 'dependabot-preview',
              'renovate', 'renovate-bot',
              'snyk-bot',
              'github-actions',
              'allcontributors',
            ];
            const isBot =
              authorType === 'Bot' ||
              author.endsWith('[bot]') ||
              knownBots.some(bot => author.toLowerCase() === bot);

            if (isBot) {
              console.log(`Issue #${issueNumber} created by bot ${author} (type: ${authorType}) — skipping auto-close.`);
              return;
            }

            // Check if the issue author is a maintainer/collaborator
            let isMaintainer = false;
            try {
              const { data: permissionData } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner,
                repo,
                username: author
              });
              const permission = permissionData.permission;
              isMaintainer = permission === "admin" || permission === "maintain" || permission === "write";
            } catch (e) {
              if (e && e.status === 404) {
                isMaintainer = false;
              } else {
                console.error(
                  `Error checking collaborator permission level for ${author} on ${owner}/${repo}:`,
                  `status=${e && e.status}, message=${e && e.message}`
                );
                // Fail open: skip auto-closing so maintainers aren't accidentally blocked
                return;
              }
            }

            if (isMaintainer) {
              console.log(`Issue #${issueNumber} created by maintainer ${author} — skipping auto-close.`);
              return;
            }

            const message = `
                  🚫 **Please do not create new issues**  
                  We currently have **many open issues** to focus on, some even with $5 bounties.
                  
                  If you believe your issue is important and should be solved,  
                  please create a new topic in the BLT forum page instead.  
                  Thanks for understanding! 🙏
                  `;

            // Leave the comment
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: message
            });

            // Close the issue
            await github.rest.issues.update({
              owner,
              repo,
              issue_number: issueNumber,
              state: "closed"
            });
