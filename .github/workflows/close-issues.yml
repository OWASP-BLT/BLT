name: Auto-Close New Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  close-new-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Close the issue with a message
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue.number;
            const repo = context.repo.repo;
            const owner = context.repo.owner;
            const author = context.payload.issue.user.login;

            // Check if the issue author is a maintainer/collaborator
            let isMaintainer = false;
            try {
              const { data: permissionData } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner,
                repo,
                username: author
              });
              const permission = permissionData.permission;
              isMaintainer = permission === "admin" || permission === "maintain" || permission === "write";
            } catch (e) {
              // If the user is not a collaborator, the API returns 404
              isMaintainer = false;
            }

            if (isMaintainer) {
              console.log(`Issue #${issueNumber} created by maintainer ${author} — skipping auto-close.`);
              return;
            }

            const message = `
                  🚫 **Please do not create new issues**  
                  We currently have **many open issues** to focus on, some even with $5 bounties.
                  
                  If you believe your issue is important and should be solved,  
                  please create a new topic in the BLT forum page instead.  
                  Thanks for understanding! 🙏
                  `;

            // Leave the comment
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: message
            });

            // Close the issue
            await github.rest.issues.update({
              owner,
              repo,
              issue_number: issueNumber,
              state: "closed"
            });
