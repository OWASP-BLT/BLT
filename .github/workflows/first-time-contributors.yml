name: Build first-time contributor in README(org-wide)

on:
  workflow_dispatch:
    inputs:
      org:
        description: GitHub org to scan
        default: OWASP-BLT
        required: true
      since:
        description: Cutoff date (ISO, merged after this)
        default: "2026-04-02"
        required: true
  schedule:
    - cron: "15 7 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update first-time contributors in README
        id: build
        uses: actions/github-script@v7
        env:
          ORG: ${{ github.event_name == 'workflow_dispatch' && inputs.org || 'OWASP-BLT' }}
          SINCE: ${{ github.event_name == 'workflow_dispatch' && inputs.since || '2026-04-02' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const org = process.env.ORG || 'OWASP-BLT';
            const since = process.env.SINCE || '2026-04-02';
            const repo = 'BLT';

            const bots = new Set([
              'github-actions[bot]',
              'dependabot[bot]',
              'owasp-blt[bot]',
              'coderabbitai[bot]'
            ]);

            function isBot(login) {
              if (!login) return true;
              const lower = login.toLowerCase();
              return lower.endsWith('[bot]') || bots.has(lower);
            }

            function clean(s) {
              return String(s || '')
                .replace(/\|/g, '\\|')
                .replace(/\n/g, ' ')
                .trim();
            }

            function parsePullFromUrl(url) {
              const m = String(url || '').match(/^https:\/\/github\.com\/([^/]+)\/([^/]+)\/pull\/(\d+)/i);
              if (!m) return null;
              return {
                owner: m[1],
                repo: m[2],
                number: Number(m[3])
              };
            }

            const payoutCommentPattern = /Transaction ID:\s*ch_[A-Za-z0-9_]+/;
            const payoutCommentCache = new Map();

            async function isPaidPullRequest(owner, repo, number) {
              if (!owner || !repo || !number) return false;
              const key = `${owner}/${repo}#${number}`;
              if (payoutCommentCache.has(key)) return payoutCommentCache.get(key);
              try {
                const comments = await github.paginate(
                  github.rest.issues.listComments,
                  {
                    owner,
                    repo,
                    issue_number: Number(number),
                    per_page: 100
                  },
                  (res) => res.data
                );
                const paid = comments.some((c) => payoutCommentPattern.test(c.body || ''));
                payoutCommentCache.set(key, paid);
                return paid;
              } catch (err) {
                console.error(`isPaidPullRequest failed for ${owner}/${repo}#${number}`);
                payoutCommentCache.set(key, false);
                return false;
              }
            }

            const sinceDate = new Date(`${since}T00:00:00Z`);

            const repos = (await github.paginate(
              github.rest.repos.listForOrg,
              {
                org,
                per_page: 100,
                type: 'all'
              },
              (res) => res.data
            )).filter(r => !r.archived && !r.disabled);

            const earliestMergedByAuthor = new Map();

            for (const repoInfo of repos) {
              const repoName = repoInfo.name;
              console.log(`Scanning repo: ${repoName}`);

              let pulls;
              try {
                pulls = await github.paginate(
                  github.rest.pulls.list,
                  {
                    owner: org,
                    repo: repoName,
                    state: 'closed',
                    per_page: 100
                  },
                  (res) => res.data
                );
              } catch (err) {
                console.log(`Skipping repo ${repoName}: ${err.status || ''} ${err.message}`);
                continue;
              }

              for (const pr of pulls) {
                if (!pr?.user?.login) continue;
                if (!pr.merged_at) continue;

                const login = pr.user.login;
                if (isBot(login)) continue;

                const mergedAt = new Date(pr.merged_at);
                const prev = earliestMergedByAuthor.get(login);

                if (!prev || mergedAt < prev.mergedAt) {
                  earliestMergedByAuthor.set(login, {
                    login,
                    mergedAt,
                    pr: {
                      owner: org,
                      repo: repoName,
                      number: pr.number,
                      title: pr.title,
                      url: pr.html_url,
                      merged_at: pr.merged_at
                    }
                  });
                }
              }
            }

            const firstTimers = [];
            for (const [login, rec] of earliestMergedByAuthor.entries()) {
              if (rec.mergedAt >= sinceDate) {
                firstTimers.push({
                  login,
                  firstMergedAt: rec.pr.merged_at,
                  pr: rec.pr
                });
              }
            }

            // Helpers
            async function getUser(login) {
              try {
                const r = await github.rest.users.getByUsername({ username: login });
                return r.data || {};
              } catch (err) {
                console.log(`getUser failed for ${login}: ${err.message}`);
                return {};
              }
            }

            async function sponsorsExists(login) {
              const url = `https://github.com/sponsors/${login}`;
              try {
                const res = await fetch(url, {
                  method: 'GET',
                  redirect: 'follow'
                });

                const finalUrl = (res.url || '').toLowerCase();
                const expected = `/sponsors/${login.toLowerCase()}`;

                const exists =
                  res.ok &&
                  finalUrl.includes('/sponsors/') &&
                  finalUrl.endsWith(expected);

                return { exists, url };
              } catch (err) {
                console.log(`sponsorsExists failed for ${login}: ${err.message}`);
                return { exists: false, url };
              }
            }

            // Build newly discovered contributors only
            const newContributors = await Promise.all(
              firstTimers.map(async (ent) => {
                const u = await getUser(ent.login);
                return {
                  login: ent.login,
                  name: u.name || ent.login,
                  profile_url: u.html_url || `https://github.com/${ent.login}`,
                  prOwner: ent.pr.owner,
                  prRepo: ent.pr.repo,
                  prNumber: String(ent.pr.number),
                  prUrl: ent.pr.url
                };
              })
            );

            // Read README
            const readmePath = 'README.md';
            const readme = fs.existsSync(readmePath)
              ? fs.readFileSync(readmePath, 'utf8')
              : '';

            // Parse existing table rows exactly and preserve them
            const existing = new Map();
            const rowOrder = [];

            const sectionMatch = readme.match(
              /<!-- FIRST_TIME_CONTRIBUTORS_START -->([\s\S]*?)<!-- FIRST_TIME_CONTRIBUTORS_END -->/
            );

            if (sectionMatch) {
              const lines = sectionMatch[1].split('\n');

              for (const line of lines) {
                if (!line.startsWith('| [')) continue;

                const parts = line.split('|').map(s => s.trim());

                const contributorCell = parts[1] || '';
                const prCell = parts[2] || '';

                const nameMatch = contributorCell.match(/\[(.*?)\]\((.*?)\)/);
                const prMatch = prCell.match(/\[#(\d+)\]\((.*?)\)/);

                if (!nameMatch || !prMatch) continue;

                const name = nameMatch[1];
                const profileUrl = nameMatch[2];
                const login = profileUrl.split('/').pop();
                const parsed = parsePullFromUrl(prMatch[2]);

                if (!login) continue;

                existing.set(login, {
                  login,
                  name,
                  profile_url: profileUrl,
                  prOwner: parsed?.owner || org,
                  prRepo: parsed?.repo || repo,
                  prNumber: prMatch[1],
                  prUrl: prMatch[2]
                });

                rowOrder.push(login);
              }
            }

            // Add only brand new contributors; keep old contributor/PR cells unchanged
            for (const c of newContributors) {
              if (!existing.has(c.login)) {
                existing.set(c.login, c);
                rowOrder.push(c.login);
              }
            }

            // Rebuild table: old rows preserved, only sponsor value refreshed
            let table = `## First-time Contributors (since ${since})\n\n`;
            table += `| Contributor | First PR | Sponsors |\n`;
            table += `|------------|----------|----------|\n`;

            if (rowOrder.length === 0) {
              table += `| _No new contributors_ | - | - |\n`;
            } else {
              for (const login of rowOrder) {
                const c = existing.get(login);
                const sp = await sponsorsExists(login);
                const paid = await isPaidPullRequest(c.prOwner, c.prRepo, c.prNumber);

                const name = clean(c.name || c.login);
                const sponsor = sp.exists ? `[Yes](${sp.url})` : `No`;
                const paidMarker = paid ? ' 💰' : '';

                table += `| [${name}](${c.profile_url}) | [#${c.prNumber}](${c.prUrl})${paidMarker} | ${sponsor} |\n`;
              }
            }

            // Inject into README
            const START = '<!-- FIRST_TIME_CONTRIBUTORS_START -->';
            const END = '<!-- FIRST_TIME_CONTRIBUTORS_END -->';
            const escapeRegex = (v) => v.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

            const section = `${START}\n${table}\n${END}`;

            let updated;
            if (readme.includes(START) && readme.includes(END)) {
              const regex = new RegExp(
                `${escapeRegex(START)}[\\s\\S]*?${escapeRegex(END)}`
              );
              updated = readme.replace(regex, section);
            } else {
              updated = readme + `\n\n${section}`;
            }

            // Write only if changed
            if (readme !== updated) {
              fs.writeFileSync(readmePath, updated);
              core.setOutput('changed', 'true');
            } else {
              core.setOutput('changed', 'false');
            }

            core.setOutput('count', String(rowOrder.length));

      - name: Commit and push README changes
        if: steps.build.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update first-time contributors list [skip ci]"
          git push
