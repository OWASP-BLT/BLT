name: Close PRs from Non-First-Time Contributors

# Uses pull_request_target so it runs with base repo permissions for forked PRs.
# SECURITY: We do NOT check out or execute PR code. We only use the GitHub API.
#
# Accepted PR policy:
#   1. Contributor must not have prior PRs across the OWASP-BLT organization
#      (current PR excluded from count).
#   2. PR must consist entirely of only 1 file deletion (no additions or modifications).
on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  check_contributor_pr:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.user.type != 'Bot'
      && github.actor != 'dependabot[bot]'
      && github.actor != 'dependabot-preview[bot]'
      && github.actor != 'dependabot'
      && github.actor != github.repository_owner
      && github.actor != 'sentry-autofix'
      && github.actor != 'sentry-io'
      && github.actor != 'sentry-io[bot]'
      && github.actor != 'DonnieBLT'
      && github.actor != 'copilot-swe-agent[bot]'
      && github.actor != 'copilot-swe-agent'
      && github.actor != 'coderabbitai[bot]'
      && github.actor != 'coderabbitai'
      && github.actor != 'renovate[bot]'
      && github.actor != 'renovate'
      && github.actor != 'snyk-bot'
      && github.actor != 'github-actions[bot]'
      && github.actor != 'allcontributors[bot]'
    steps:
      - name: Enforce new-contributor PR policy
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull_request in context. Skipping.');
              return;
            }

            const owner       = context.repo.owner;   // "OWASP-BLT"
            const repo        = context.repo.repo;
            const pull_number = pr.number;
            const author      = pr.user.login;

            // ── Gate 1: Org-wide prior PR count (OPEN + MERGED only) ──────────────
            // Count PRs by this author in the org BEFORE the current PR was created.
            const createdAtIso = new Date(pr.created_at).toISOString();

            const base    = `org:${owner}`; // keep org-scope as per policy
            const qOpen   = `${base} is:pr is:open   author:${author} created:<${createdAtIso}`;
            const qMerged = `${base} is:pr is:merged author:${author} created:<${createdAtIso}`;

            async function count(q) {
              try {
                const r = await github.request('GET /search/issues', { q, per_page: 1 });
                return r.data.total_count || 0;
              } catch (e) {
                core.info(`[Gate] search failed for "${q}" (${e.status || e.message}); fail-closed`);
                // Return a sentinel so later messaging does not treat an API failure
                // as a verified prior PR count.
                return null;
              }
            }
            const [openCnt, mergedCnt] = await Promise.all([count(qOpen), count(qMerged)]);
            const hasPriorCountLookupError = openCnt === null || mergedCnt === null;
            const priorCount = hasPriorCountLookupError ? null : openCnt + mergedCnt;
            if (hasPriorCountLookupError) {
              core.info(
                `Author ${author} prior PR count in ${owner} could not be verified due to a GitHub API error; applying fail-closed policy`
              );
            } else {
              core.info(
                `Author ${author} prior PRs in ${owner} (excluding current): open=${openCnt}, merged=${mergedCnt}, total=${priorCount}`
              );
            }
            const exceedsLimit = !hasPriorCountLookupError && priorCount > 0;
            if (hasPriorCountLookupError || exceedsLimit) {
              const countMessage = hasPriorCountLookupError
                ? `We were unable to verify your prior PR count due to an API error`
                : `Our records show you have **${priorCount} prior PR(s)**, which exceeds the limit`;
              const body = [
                `👋 Hi @${author}, thanks for the PR!`,
                ``,
                `🚫 This repository currently only accepts pull requests from **new contributors**`,
                `(**No prior PRs counted as OPEN or MERGED across the ${owner} organization**).`,
                ``,
                `${countMessage}, so this PR is being closed.`,
                ``,
                `If you believe this was closed in error, please open an issue to discuss with the maintainers.`,
                ``,
                `Thank you for understanding.`,
              ].join('\n');

              await github.rest.issues.createComment({ owner, repo, issue_number: pull_number, body });
              await github.rest.pulls.update({ owner, repo, pull_number, state: 'closed' });
              const reason = hasPriorCountLookupError ? 'API lookup failed (fail-closed)' : `priorCount ${priorCount} > 0`;
              core.info(`PR #${pull_number} closed (${reason}).`);
              return;
            }

            // ── Gate 2: File-deletion policy ─────────────────────────────────
            // PR must consist entirely of 1 file deletion.
            const MAX_DELETIONS = 1;
            const filesRes = await github.rest.pulls.listFiles({
              owner,
              repo,
              pull_number,
              per_page: 100,
            });
            const files = filesRes.data;

            core.info(`PR #${pull_number} changes ${files.length} file(s).`);
            files.forEach(f => core.info(`  ${f.status}: ${f.filename}`));

            const allDeleted   = files.length >= 1 && files.every(f => f.status === 'removed');
            const withinLimit  = files.length <= MAX_DELETIONS;

            if (!allDeleted || !withinLimit) {
              let reason;
              if (!allDeleted) {
                const nonDeleted = files.filter(f => f.status !== 'removed').map(f => `\`${f.filename}\``).join(', ');
                reason = `This PR contains changes other than file deletions (${nonDeleted}), which is not permitted.`;
              } else {
                reason = `This PR deletes **${files.length} files**, which exceeds the maximum of **${MAX_DELETIONS}** file deletions allowed.`;
              }

              const body = [
                `👋 Hi @${author}, thanks for the PR!`,
                ``,
                `🚫 This PR has been closed because it does not meet the contribution policy.`,
                ``,
                reason,
                ``,
                `**Policy for new contributors:** PRs must consist entirely of file deletions, with at most ${MAX_DELETIONS} files deleted.`,
                ``,
                `If you believe this was closed in error, please open an issue to discuss with the maintainers.`,
                ``,
                `Thank you for understanding.`,
              ].join('\n');

              await github.rest.issues.createComment({ owner, repo, issue_number: pull_number, body });
              await github.rest.pulls.update({ owner, repo, pull_number, state: 'closed' });
              core.info(`PR #${pull_number} closed (file policy: allDeleted=${allDeleted}, count=${files.length}).`);
              return;
            }

            // ── All gates passed ─────────────────────────────────────────────
            core.info(`PR #${pull_number} allowed (priorCount=${priorCount} <= 0, ${files.length} file(s) all deleted).`);

            async function sponsorsExists(login) {
              const url = `https://github.com/sponsors/${login}`;

              try {
                const res = await fetch(url, {
                  method: 'GET',
                  redirect: 'follow'
                });

                const finalUrl = (res.url || '').toLowerCase();

                if (res.status === 200 && finalUrl.includes(`/sponsors/${login.toLowerCase()}`)) {
                  return { exists: true, reason: "valid_page", url };
                }

                if (res.status === 404) {
                  return { exists: false, reason: "not_found", url };
                }

                if (res.status === 200 && !finalUrl.includes('/sponsors/')) {
                  return { exists: false, reason: "redirected", url };
                }

                return { exists: false, reason: "unknown_" + res.status, url };

              } catch (err) {
                core.warning(`Error checking sponsors page: ${err.message}`);
                return { exists: false, reason: "error", url };
              }
            }

            const username = context.payload.pull_request.user.login;
            const result = await sponsorsExists(username);

            let message;

            if (!result.exists) {
              message = [
                `⚠️ @${username}, we couldn't verify a usable GitHub Sponsors profile for your account.`,
                "",
                "To receive the $1 campaign reward, please set up or complete your Sponsors profile:",
                "https://github.com/sponsors",
                "",
                "Make sure:",
                "• your profile is fully configured  ",
                "• it is publicly accessible  ",
                "",
                "If you've already set it up, please check your settings and try again."
              ].join('\n');
            }

            if (message) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: message
              });
            }