name: Close Single File Deletion PRs

# Uses pull_request_target so it runs with base repo permissions for forked PRs.
# SECURITY: We do NOT check out or execute PR code. We only use the GitHub API.
#
# Policy for single-file deletion PRs:
#   - First-time contributors: only their single-file deletion PRs are accepted;
#     any other type of change from a first-time contributor is closed.
#   - All other contributors: single-file deletion PRs are automatically closed.
#     File deletions from returning contributors require human review to verify:
#       1. The deletion does not break any existing code or functionality.
#       2. A sufficient replacement exists in another repository (if applicable).
#     Open an issue to discuss with maintainers before creating such a PR.
on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  check_single_file_deletion_pr:
    runs-on: ubuntu-latest
    if: >
      github.actor != 'dependabot[bot]'
      && github.actor != 'dependabot-preview[bot]'
      && github.actor != 'dependabot'
      && github.actor != github.repository_owner
      && github.actor != 'sentry-autofix'
      && github.actor != 'DonnieBLT'
      && github.actor != 'copilot-swe-agent[bot]'
      && github.actor != 'copilot-swe-agent'
    steps:
      - name: Enforce single-file deletion PR policy
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull_request in context. Skipping.');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = pr.number;
            const authorAssociation = pr.author_association;
            const author = pr.user.login;

            core.info(`PR #${pull_number} by ${author} (association: ${authorAssociation})`);

            // FIRST_TIMER: author has never made any commit on GitHub before (brand new GitHub user)
            // FIRST_TIME_CONTRIBUTOR: author has committed elsewhere but never to this repository
            const isFirstTimeContributor =
              authorAssociation === 'FIRST_TIMER' ||
              authorAssociation === 'FIRST_TIME_CONTRIBUTOR';

            // Get all files changed in the PR (with pagination)
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            core.info(`PR #${pull_number} changes ${files.length} file(s).`);
            files.forEach(f => core.info(`  ${f.status}: ${f.filename}`));

            const onlyOneFileDeleted = files.length === 1 && files[0].status === 'removed';
            const deletedFile = onlyOneFileDeleted ? files[0].filename : null;

            let closeReason = null;
            let message = null;

            if (isFirstTimeContributor && !onlyOneFileDeleted) {
              // First-time contributor whose PR is NOT a single-file deletion
              closeReason = `first-time contributor submitting a non-single-file-deletion PR`;
              message = [
                `👋 Hi @${author}, thank you for your interest in contributing!`,
                '',
                '🚫 **This pull request has been automatically closed** because pull requests from first-time contributors are only accepted when they **delete exactly one file**.',
                '',
                'The conditions that must both be true for a first-time contributor\'s PR to be accepted are:',
                '',
                '1. **You have not previously contributed** to this repository',
                '2. **The PR deletes exactly one file** with no other changes',
                '',
                'Your PR does not meet condition 2.',
                '',
                '⚠️ **Please note:** Closed pull requests of this type are recorded and will count toward **negative scoring** on your contributor profile.',
                '',
                'If you believe this was closed in error, please open an issue to discuss it with the maintainers before resubmitting.',
                '',
                '**We warmly welcome genuine contributions!** Here are some great ways to get started:',
                '- Browse issues labeled [`good first issue`](../../labels/good%20first%20issue)',
                '- Fix a bug or implement a requested feature',
                '- Improve tests or documentation in a meaningful way',
                '',
                'Thank you for your understanding! 🙏',
              ].join('\n');
            } else if (!isFirstTimeContributor && onlyOneFileDeleted) {
              // Returning contributor submitting a single-file deletion
              closeReason = `returning contributor (${authorAssociation}) submitting a single-file deletion`;
              message = [
                `👋 Hi @${author},`,
                '',
                `🚫 **This pull request has been automatically closed** because it only deletes \`${deletedFile}\` with no other changes.`,
                '',
                'File deletion PRs must be discussed with the maintainers in an issue **before** a PR is created. For a deletion to be accepted, all of the following must be verified:',
                '',
                '1. **The deletion does not break any existing code or functionality** — nothing in the codebase may import, reference, or depend on this file.',
                '2. **A sufficient replacement exists** (e.g., the functionality has been moved to another repository or an equivalent resource is available).',
                '',
                'Please [open an issue](../../issues/new) to discuss the deletion with the maintainers first. They can confirm whether both conditions are satisfied and whether a replacement repository is needed.',
                '',
                '⚠️ **Please note:** Closed pull requests of this type are recorded and will count toward **negative scoring** on your contributor profile.',
                '',
                'Thank you for your understanding! 🙏',
              ].join('\n');
            }

            if (!closeReason) {
              core.info(`PR #${pull_number} does not match any auto-close condition. No action taken.`);
              return;
            }

            core.info(`Closing PR #${pull_number}: ${closeReason}.`);

            // Post an explanatory comment on the PR
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pull_number,
              body: message,
            });

            // Close the PR
            await github.rest.pulls.update({
              owner,
              repo,
              pull_number,
              state: 'closed',
            });

            core.info(`PR #${pull_number} has been closed with an explanatory comment.`);
