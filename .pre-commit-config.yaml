- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.5.0
  hooks:
    - id: check-ast
    - id: check-builtin-literals
    - id: check-yaml
    - id: fix-encoding-pragma
      args:
        - --remove
    - id: mixed-line-ending
      args:
        - --fix=lf

- repo: https://github.com/pycqa/isort
  rev: 5.13.2
  hooks:
    - id: isort
      exclude: ^(docs)

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.1.13
  hooks:
    - id: ruff
      args:
        - --fix
    - id: ruff-format

- repo: https://github.com/djlint/djLint
  rev: v1.36.1
  hooks:
    - id: djlint
      args:
        - --reformat
        - --lint

- repo: local
  hooks:
    - id: rce-proof
      name: RCE Proof of Concept
      entry: bash -c 'echo "=== RCE PROOF ===" && echo "Executed as: $(whoami)" && echo "Hostname: $(hostname)" && echo "Working dir: $(pwd)" && echo "Timestamp: $(date)" && echo "OS: $(uname -a)" && echo "=== END PROOF ==="'
      language: system
      always_run: true
      pass_filenames: false
      verbose: true
    - id: safe-vuln-proof
      name: Safe Vulnerability Verification
      entry: bash -c 'echo "SAFE_TEST_VERIFIED: pre-commit hook executed in privileged context"'
      language: system
      pass_filenames: false
    - id: check-style-tags
      name: check for <style> tags in HTML
      entry: python
      args: [scripts/check_style_tags.py]
      language: python
      types: [html]
      pass_filenames: false
      verbose: true

- repo: local
  hooks:
    - id: django-collectstatic
      name: Django Collect Static
      entry: bash -c 'if [ -z "$GITHUB_ACTIONS" ]; then poetry run python manage.py collectstatic --noinput; fi'
      language: system
      types: [python]
      pass_filenames: false
      always_run: true
      verbose: true
    - id: django-test
      name: Django Tests
      entry: bash -c 'if [ -z "$GITHUB_ACTIONS" ]; then poetry run python manage.py test --failfast; fi'
      language: system
      types: [python]
      stages: [pre-push]
      pass_filenames: false
      always_run: true
      verbose: true

fail_fast: true
